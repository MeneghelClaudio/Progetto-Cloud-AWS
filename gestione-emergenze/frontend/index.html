<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Emergenze</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Gestione Emergenze</h1>
            <a href="/dashboard/" class="btn-back">← Torna alla Dashboard</a>
        </header>

        <div class="stats">
            <div class="stat-card open">
                <h3 id="countOpen">0</h3>
                <div class="label">Aperte</div>
            </div>
            <div class="stat-card in-carico">
                <h3 id="countInCarico">0</h3>
                <div class="label">In Carico</div>
            </div>
            <div class="stat-card closed">
                <h3 id="countClosed">0</h3>
                <div class="label">Chiuse</div>
            </div>
            <div class="stat-card avg">
                <h3 id="avgDuration">-</h3>
                <div class="label">Durata Media (min)</div>
            </div>
        </div>

        <div class="view-toggle">
            <button class="btn-view active" onclick="switchView('operator')">Vista Operatore</button>
            <button class="btn-view" onclick="switchView('central')">Vista Centrale Operativa</button>
        </div>

        <!-- VISTA OPERATORE -->
        <div id="operatorView" class="content-area">
            <div class="panel">
                <h2>Nuova Segnalazione</h2>
                <form id="emergencyForm">
                    <div class="form-group">
                        <label>Tipologia Emergenza</label>
                        <select id="emergencyType" required>
                            <option value="incidente">Incidente</option>
                            <option value="terremoto">Terremoto</option>
                            <option value="incendio">Incendio</option>
                            <option value="alluvione">Alluvione</option>
                            <option value="altro">Altro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Descrizione</label>
                        <textarea id="emergencyDesc" required placeholder="Descrivi l'emergenza..."></textarea>
                    </div>

                    <!-- Sezione posizione -->
                    <div class="form-group">
                        <label>Posizione <span class="label-hint">(opzionale)</span></label>
                        <div class="geo-toolbar">
                            <button type="button" class="btn-geo" id="geoBtn" onclick="useMyLocation()">📍 Usa GPS</button>
                            <span class="geo-sep">oppure cerca un luogo</span>
                        </div>
                        <div class="search-row">
                            <input type="text" id="addressSearch" placeholder="Es. Via Roma, Milano" autocomplete="off">
                            <button type="button" class="btn-search" onclick="searchAddress()">🔍</button>
                        </div>
                        <div id="searchResults" class="search-results" style="display:none;"></div>
                        <div id="geoStatus" class="geo-status"></div>
                        <div class="coord-row">
                            <input type="text" id="emergencyLat" placeholder="Latitudine" readonly>
                            <input type="text" id="emergencyLng" placeholder="Longitudine" readonly>
                            <button type="button" class="btn-clear-geo" onclick="clearLocation()" title="Rimuovi posizione">✕</button>
                        </div>
                        <!-- Mappa di selezione -->
                        <div id="pickMap" class="pick-map"></div>
                        <p class="pick-hint">Clicca sulla mappa per posizionare il marker</p>
                    </div>

                    <button type="submit" class="btn-submit">Invia Segnalazione</button>
                </form>
            </div>
            <div class="panel">
                <h2>Le Mie Segnalazioni</h2>
                <div class="emergencies-list" id="myEmergencies"></div>
            </div>
        </div>

        <!-- VISTA CENTRALE OPERATIVA -->
        <div id="centralView" class="content-area" style="display: none;">
            <div class="panel">
                <h2>Segnalazioni Attive <span class="live-badge">● LIVE</span></h2>
                <div class="emergencies-list" id="allEmergencies"></div>
            </div>
            <div class="panel map-panel">
                <h2>Mappa Emergenze</h2>
                <div id="map"></div>
                <div class="map-legend">
                    <span class="legend-dot red"></span> Aperta
                    <span class="legend-dot blue"></span> In Carico
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
