server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect root to login
    location = / {
        return 302 /login/;
    }

    # Login: serve files directly from root (no alias)
    location /login/ {
        try_files $uri $uri/ /login/login.html;
    }

    # Dashboard: serve files directly from root (no alias)
    location /dashboard/ {
        try_files $uri $uri/ /dashboard/dashboard.html;
    }

    # API proxy to backend
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
        proxy_cache_bypass $http_upgrade;
    }

    # Microservice: storia-del-corso
    location /storia-del-corso/ {
        proxy_pass http://storia-del-corso:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    # Microservice: gestione-emergenze
    location /gestione-emergenze/ {
        proxy_pass http://gestione-emergenze:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }
}