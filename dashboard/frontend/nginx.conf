server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;

    # Redirect root to login
    location = / {
        return 302 /login/;
    }

    # Login
    location /login/ {
        index login.html;
        try_files $uri $uri/ /login/login.html;
    }

    # Dashboard
    location /dashboard/ {
        index dashboard.html;
        try_files $uri $uri/ /dashboard/dashboard.html;
    }

    # API proxy to backend — session auth happens here
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
    }

    # Microservices — routed through backend Express (which checks auth)
    location /storia-del-corso/ {
        proxy_pass http://backend:3000/storia-del-corso/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    location /gestione-emergenze/ {
        proxy_pass http://backend:3000/gestione-emergenze/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }
}