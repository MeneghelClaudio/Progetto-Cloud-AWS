server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;

    location = / {
        return 302 /login/;
    }

    location /login/ {
        alias /usr/share/nginx/html/login/;
        try_files $uri $uri/ /login/login.html;
    }

    location /dashboard/ {
        alias /usr/share/nginx/html/dashboard/;
        try_files $uri $uri/ /dashboard/dashboard.html;
    }

    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    location /storia-del-corso {
        proxy_pass http://storia-del-corso:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /gestione-emergenze {
        proxy_pass http://gestione-emergenze:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}