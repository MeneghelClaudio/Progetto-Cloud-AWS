<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Corso System Administrator</title>
    <link rel="stylesheet" href="login.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card" id="loginCard">
            <h1>Benvenuto</h1>
            <p class="subtitle">Accedi al portale del corso</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn-primary">Accedi</button>
                </div>
                <div id="errorMessage" class="error-message"></div>
                <p class="switch-form">Non hai un account? <a href="#" id="showRegister">Registrati</a></p>
            </form>
        </div>

        <div class="login-card" id="registerCard" style="display: none;">
            <h1>Registrazione</h1>
            <p class="subtitle">Crea un nuovo account</p>
            <form id="registerForm">
                <div class="form-group">
                    <label for="regUsername">Username</label>
                    <input type="text" id="regUsername" name="username" required>
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" name="password" required>
                </div>
                <div class="form-group">
                    <div id="regErrorMessage" class="error-message"></div>
                    <button type="submit" class="btn-primary">Registrati</button>
                </div>
                <p class="switch-form">Hai già un account? <a href="#" id="showLogin">Accedi</a></p>
            </form>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
